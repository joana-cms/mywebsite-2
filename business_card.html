<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visita - Joana Clarinha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="business_card.css">
</head>

<body>
    <div class="card-container">
        <!-- Front Side -->
        <section class="card front">
            <div class="content">
                <h1 class="name">Joana Clarinha</h1>
                <p class="tagline">Thai Yoga Massage</p>
            </div>
            <div class="accent-line"></div>
        </section>

        <!-- Back Side -->
        <section class="card back">
            <div class="top-section">
                <div class="section-column">
                    <p class="section-title">Thai Yoga Massage</p>
                    <p class="section-subtitle">sessões em Lisboa</p>
                </div>
                <div class="section-column">
                    <p class="section-title">Websites</p>
                    <p class="section-subtitle">para profissionais do corpo</p>
                </div>
            </div>

            <div class="bottom-section">
                <div class="contact-details">
                    <p>ola@joanaclarinha.com</p>
                    <p>+351 9XX XXX XXX</p>
                    <p>www.joanaclarinha.com</p>
                </div>
                <!-- Small muted coral dot as a subtle detail -->
                <div class="small-accent"></div>
            </div>
        </section>
    </div>
</body>

</html>
